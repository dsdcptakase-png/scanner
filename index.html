<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#eef2f7;
}

.header {
  background:#0d6efd;
  color:white;
  padding:14px;
  text-align:center;
  font-weight:bold;
}

.container {
  max-width:420px;
  margin:auto;
  padding:10px;
}

.card {
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

/* slider */
.switch {
  display:flex;
  background:#ddd;
  border-radius:30px;
  overflow:hidden;
}
.switch input { display:none; }
.switch label {
  flex:1;
  padding:10px;
  text-align:center;
}
.switch input:checked + label {
  background:#0d6efd;
  color:white;
}

input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#0d6efd;
  color:white;
  font-size:16px;
  margin-top:8px;
}

.result {
  font-weight:bold;
  color:green;
}

</style>
</head>

<body>

<div class="header">📱 Asset Scanner</div>

<div class="container">

<!-- Asset -->
<div class="card">
  <div class="switch">
    <input type="radio" id="laptop" name="type" value="Laptop" checked>
    <label for="laptop">Laptop</label>

    <input type="radio" id="charger" name="type" value="Charger">
    <label for="charger">Charger</label>
  </div>
</div>

<!-- INPUT -->
<div class="card">
  <input type="text" id="code" placeholder="Tap here → Scan using phone camera">
</div>

<!-- RESULT -->
<div class="card result" id="result">Waiting...</div>

<button onclick="save()">💾 Save</button>

</div>

<script>

// 👉 Auto paste from scanner apps
document.getElementById("code").addEventListener("input", function() {
  document.getElementById("result").innerText = this.value;
});

// SAVE
function save() {

  let scanned = document.getElementById("code").value;

  if (!scanned) {
    alert("Scan first!");
    return;
  }

  const type = document.querySelector('input[name="type"]:checked').value;

  let url = "https://script.google.com/macros/s/AKfycbxCJPT0hf9Y0JpJV1bflXfG6v8YZzdhhAphYyr1M1oHWAVj139H_wJvj9U-03_usrgicg/exec"
    + "?assetType=" + encodeURIComponent(type)
    + "&serialNumber=" + encodeURIComponent(scanned);

  fetch(url)
    .then(res => res.text())
    .then(msg => {

      alert(msg);

      document.getElementById("code").value = "";
      document.getElementById("result").innerText = "Waiting...";
    });
}

</script>

</body>
</html>

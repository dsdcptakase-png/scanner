<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family:system-ui; background:#eef2f7; }

.header {
  background:#0d6efd;
  color:white;
  padding:14px;
  text-align:center;
  font-weight:bold;
}

.container {
  max-width:420px;
  margin:auto;
  padding:10px;
}

.card {
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

.switch {
  display:flex;
  background:#ddd;
  border-radius:30px;
}
.switch input { display:none; }
.switch label {
  flex:1;
  padding:10px;
  text-align:center;
}
.switch input:checked + label {
  background:#0d6efd;
  color:white;
}

input {
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#0d6efd;
  color:white;
  font-size:16px;
}

.result {
  font-weight:bold;
  color:green;
}
</style>
</head>

<body>

<div class="header">📱 Asset Scanner</div>

<div class="container">

<!-- Asset -->
<div class="card">
  <div class="switch">
    <input type="radio" id="laptop" name="type" value="Laptop" checked>
    <label for="laptop">Laptop</label>

    <input type="radio" id="charger" name="type" value="Charger">
    <label for="charger">Charger</label>
  </div>
</div>

<!-- Input -->
<div class="card">
  <input type="text" id="code" placeholder="Scan and paste here">
</div>

<!-- Result -->
<div class="card result" id="result">Waiting...</div>

<button onclick="save()">💾 Save</button>

</div>

<script>

// show text
document.getElementById("code").addEventListener("input", function() {
  document.getElementById("result").innerText = this.value;
});

// SAVE (🔥 CORS FIXED METHOD)
function save() {

  let scanned = document.getElementById("code").value;

  if (!scanned) {
    alert("Scan first!");
    return;
  }

  const type = document.querySelector('input[name="type"]:checked').value;

  let url = "https://script.google.com/macros/s/AKfycbwV72As_WKD5X1jXnVh20mA8Zh7xhu8IpSqF1To3zD-OnGg0317Z5jy31nyvS7Qr4Ffgw/exec"
    + "?assetType=" + encodeURIComponent(type)
    + "&serialNumber=" + encodeURIComponent(scanned);

  // 🔥 IFRAME METHOD (NO FETCH ERROR)
  let iframe = document.createElement("iframe");
  iframe.style.display = "none";
  iframe.src = url;
  document.body.appendChild(iframe);

  alert("✅ Saved");

  document.getElementById("code").value = "";
  document.getElementById("result").innerText = "Waiting...";
}

</script>

</body>
</html>

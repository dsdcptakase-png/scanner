<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { margin:0; font-family:system-ui; background:#eef2f7; }

.header {
  background:#0d6efd;
  color:white;
  padding:12px;
  text-align:center;
  font-weight:bold;
}

.container {
  max-width:420px;
  margin:auto;
  padding:8px;
}

.card {
  background:white;
  padding:10px;
  border-radius:12px;
  margin-bottom:8px;
}

/* slider */
.switch {
  display:flex;
  background:#ddd;
  border-radius:30px;
  overflow:hidden;
}
.switch input { display:none; }
.switch label {
  flex:1;
  padding:8px;
  text-align:center;
}
.switch input:checked + label {
  background:#0d6efd;
  color:white;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#0d6efd;
  color:white;
  margin-top:6px;
}

/* 🔥 SMALL CAMERA */
#reader {
  width:100%;
  height:220px;
}

.result {
  font-weight:bold;
  color:green;
  font-size:14px;
}

</style>
</head>

<body>

<div class="header">📱 Asset Scanner</div>

<div class="container">

<!-- Asset -->
<div class="card">
  <div class="switch">
    <input type="radio" id="laptop" name="type" value="Laptop" checked>
    <label for="laptop">Laptop</label>

    <input type="radio" id="charger" name="type" value="Charger">
    <label for="charger">Charger</label>
  </div>
</div>

<!-- Mode -->
<div class="card">
  <div class="switch">
    <input type="radio" id="qr" name="mode" value="qr">
    <label for="qr">QR</label>

    <input type="radio" id="bar" name="mode" value="bar" checked>
    <label for="bar">BAR</label>
  </div>
</div>

<div class="card">
  <div id="reader"></div>
</div>

<div class="card result" id="result">Waiting...</div>

<button onclick="save()">💾 Save</button>

</div>

<script>

let scanner;
let scanned = "";

const beep = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

function startScanner() {

  if (scanner) {
    scanner.stop().then(init);
  } else {
    init();
  }
}

function init() {

  scanner = new Html5Qrcode("reader");

  const mode = document.querySelector('input[name="mode"]:checked').value;

  let config = mode === "qr"
    ? { fps:15, qrbox:{width:220,height:220} }
    : { fps:15, qrbox:{width:300,height:100} };

  Html5Qrcode.getCameras().then(devices => {

    let cam = devices.find(d => d.label.toLowerCase().includes("back"));

    scanner.start(
      cam ? cam.id : devices[0].id,
      config,
      (text) => {

        if (text === scanned) return;

        scanned = text;
        document.getElementById("result").innerText = text;

        navigator.vibrate?.(200);
        beep.play();
      }
    );

  });
}

// auto switch
document.getElementById("laptop").onchange = ()=>{
  document.getElementById("bar").checked = true;
  startScanner();
};

document.getElementById("charger").onchange = ()=>{
  document.getElementById("qr").checked = true;
  startScanner();
};

document.getElementById("qr").onchange = startScanner;
document.getElementById("bar").onchange = startScanner;

// SAVE (🔥 FIXED)
function save() {

  if (!scanned) {
    alert("Scan first!");
    return;
  }

  const type = document.querySelector('input[name="type"]:checked').value;

  let url = "https://script.google.com/macros/s/AKfycbxCJPT0hf9Y0JpJV1bflXfG6v8YZzdhhAphYyr1M1oHWAVj139H_wJvj9U-03_usrgicg/exec"
    + "?assetType=" + encodeURIComponent(type)
    + "&serialNumber=" + encodeURIComponent(scanned);

  fetch(url)
    .then(res => res.text())
    .then(msg => {
      alert(msg); // shows Saved / Duplicate

      scanned = "";
      document.getElementById("result").innerText = "Waiting...";
    });
}

// start
startScanner();

</script>

</body>
</html>

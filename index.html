<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/@zxing/browser@latest"></script>

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#eef2f7;
  text-align:center;
}

.header {
  background:#0d6efd;
  color:white;
  padding:14px;
  font-weight:bold;
}

.container {
  max-width:420px;
  margin:auto;
  padding:10px;
}

.card {
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

video {
  width:100%;
  height:240px;
  object-fit:cover;
  border-radius:12px;
  background:black;
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#0d6efd;
  color:white;
  font-size:16px;
  margin-top:8px;
}

.result {
  font-weight:bold;
  color:green;
  word-break:break-word;
}
</style>
</head>

<body>

<div class="header">📱 Asset Scanner</div>

<div class="container">

<!-- TYPE -->
<div class="card">
  <label><input type="radio" name="type" value="Laptop" checked> Laptop</label>
  &nbsp;&nbsp;
  <label><input type="radio" name="type" value="Charger"> Charger</label>
</div>

<button onclick="startCamera()">📷 Start Camera</button>

<div class="card">
  <video id="video" autoplay muted playsinline></video>
</div>

<div class="card result" id="result">Waiting...</div>

<button onclick="save()">💾 Save</button>

</div>

<script>

let codeReader;
let scanned = "";

// ✅ START CAMERA (FIXED)
function startCamera() {

  codeReader = new ZXing.BrowserMultiFormatReader();

  codeReader.decodeFromConstraints(
    {
      video: {
        facingMode: "environment" // 🔥 FIX (no exact)
      }
    },
    'video',
    (result, err) => {

      if (result) {

        let text = result.getText();

        if (text === scanned) return;

        scanned = text;
        document.getElementById("result").innerText = text;

        navigator.vibrate?.(200);
      }
    }
  );
}

// SAVE
function save() {

  if (!scanned) {
    alert("Scan first!");
    return;
  }

  const type = document.querySelector('input[name="type"]:checked').value;

  let url = "https://script.google.com/macros/s/AKfycbwV72As_WKD5X1jXnVh20mA8Zh7xhu8IpSqF1To3zD-OnGg0317Z5jy31nyvS7Qr4Ffgw/exec"
    + "?assetType=" + encodeURIComponent(type)
    + "&serialNumber=" + encodeURIComponent(scanned);

  let iframe = document.createElement("iframe");
  iframe.style.display = "none";
  iframe.src = url;
  document.body.appendChild(iframe);

  alert("✅ Saved");

  scanned = "";
  document.getElementById("result").innerText = "Waiting...";
}

</script>

</body>
</html>

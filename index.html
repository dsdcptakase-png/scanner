<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { margin:0; font-family:system-ui; background:#eef2f7; }

.header {
  background:#0d6efd;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.container {
  max-width:480px;
  margin:auto;
  padding:10px;
}

.card {
  background:white;
  padding:14px;
  border-radius:14px;
  margin-bottom:10px;
}

/* slider */
.switch {
  display:flex;
  background:#ddd;
  border-radius:30px;
  overflow:hidden;
}
.switch input { display:none; }
.switch label {
  flex:1;
  padding:10px;
  text-align:center;
}
.switch input:checked + label {
  background:#0d6efd;
  color:white;
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#0d6efd;
  color:white;
  margin-top:8px;
  font-size:16px;
}

#reader { width:100%; }

.result {
  font-weight:bold;
  color:green;
  word-break:break-word;
}

</style>
</head>

<body>

<div class="header">📱 Asset Scanner</div>

<div class="container">

<!-- Asset Type -->
<div class="card">
  <div class="switch">
    <input type="radio" id="laptop" name="type" value="Laptop" checked>
    <label for="laptop">Laptop</label>

    <input type="radio" id="charger" name="type" value="Charger">
    <label for="charger">Charger</label>
  </div>
</div>

<!-- Scan Mode -->
<div class="card">
  <div class="switch">
    <input type="radio" id="qr" name="mode" value="qr">
    <label for="qr">QR</label>

    <input type="radio" id="bar" name="mode" value="bar" checked>
    <label for="bar">BAR</label>
  </div>
</div>

<!-- Zoom -->
<div class="card">
  Zoom:
  <input type="range" id="zoom" min="1" max="5" step="0.1" value="1">
</div>

<!-- Scanner -->
<div class="card">
  <div id="reader"></div>
  <button onclick="toggleTorch()">💡 Flash</button>
</div>

<!-- Result -->
<div class="card">
  <div id="result" class="result">Waiting...</div>
</div>

<button onclick="save()">💾 Save</button>

</div>

<script>

let scanner;
let scanned = "";
let torch = false;
let currentZoom = 1;

const beep = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

// START SCANNER
function startScanner() {

  if (scanner) {
    scanner.stop().then(initScanner);
  } else {
    initScanner();
  }
}

function initScanner() {

  scanner = new Html5Qrcode("reader");

  const mode = document.querySelector('input[name="mode"]:checked').value;

  let config;

  if (mode === "qr") {
    config = {
      fps: 20,
      qrbox: { width: 300, height: 300 }
    };
  } else {
    config = {
      fps: 20,
      qrbox: { width: 350, height: 120 }
    };
  }

  Html5Qrcode.getCameras().then(devices => {

    let back = devices.find(d =>
      d.label.toLowerCase().includes("back") ||
      d.label.toLowerCase().includes("environment")
    );

    scanner.start(
      back ? back.id : devices[0].id,
      config,
      (text) => {

        if (text === scanned) return;

        scanned = text;
        document.getElementById("result").innerText = text;

        navigator.vibrate?.(200);
        beep.play();
      }
    ).then(applyZoom);

  });
}

// ZOOM
function applyZoom() {
  scanner.applyVideoConstraints({
    advanced: [{ zoom: currentZoom }]
  }).catch(()=>{});
}

document.getElementById("zoom").addEventListener("input", (e)=>{
  currentZoom = parseFloat(e.target.value);
  applyZoom();
});

// FLASH
function toggleTorch() {
  torch = !torch;

  scanner.applyVideoConstraints({
    advanced:[{torch:torch}]
  }).catch(()=>alert("Flash not supported"));
}

// AUTO SWITCH
document.getElementById("laptop").addEventListener("change", ()=>{
  document.getElementById("bar").checked = true;
  startScanner();
});

document.getElementById("charger").addEventListener("change", ()=>{
  document.getElementById("qr").checked = true;
  startScanner();
});

// MODE CHANGE
document.getElementById("qr").addEventListener("change", startScanner);
document.getElementById("bar").addEventListener("change", startScanner);

// TAP REFOCUS
document.getElementById("reader").addEventListener("click", ()=>{
  startScanner();
});

// SAVE (NO-CORS FIX)
function save() {

  if (!scanned) {
    alert("Scan first!");
    return;
  }

  const type = document.querySelector('input[name="type"]:checked').value;

  fetch("https://script.google.com/macros/s/AKfycbxCJPT0hf9Y0JpJV1bflXfG6v8YZzdhhAphYyr1M1oHWAVj139H_wJvj9U-03_usrgicg/exec", {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      assetType: type,
      serialNumber: scanned
    })
  })
  .then(() => {
    alert("✅ Saved successfully!");
    scanned = "";
    document.getElementById("result").innerText = "Waiting...";
  })
  .catch(err => {
    alert("Error: " + err);
  });
}

// START
startScanner();

</script>

</body>
</html>

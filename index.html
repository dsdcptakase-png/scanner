<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asset Scanner - Focus Enabled</title>
    <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
    <style>
        :root { --primary: #0d6efd; --success: #198754; }
        body { margin:0; font-family: system-ui; background: #f0f2f5; text-align:center; }
        .header { background: var(--primary); color:white; padding:15px; font-weight:bold; }
        .container { max-width:400px; margin:auto; padding:10px; }
        .card { background:white; padding:12px; border-radius:12px; margin-bottom:10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        /* Video Container */
        .video-wrapper { position: relative; background: #000; border-radius: 12px; overflow: hidden; cursor: pointer; }
        video { width: 100%; height: 320px; object-fit: cover; display: block; }
        
        /* Focus Ring Animation */
        .focus-ring {
            position: absolute; top: 50%; left: 50%; width: 60px; height: 60px;
            border: 2px solid yellow; border-radius: 50%; transform: translate(-50%, -50%) scale(0);
            pointer-events: none; opacity: 0;
        }
        .focus-active { animation: focus-pulse 0.5s ease-out; }
        @keyframes focus-pulse {
            0% { transform: translate(-50%, -50%) scale(2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        .tap-hint { font-size: 12px; color: #666; margin-top: 5px; }
        button { width:100%; padding:15px; border:none; border-radius:10px; color:white; font-size:16px; font-weight:bold; margin-top:10px; }
        .btn-blue { background: var(--primary); }
        .btn-green { background: var(--success); }
        .result { font-size: 18px; color: var(--success); font-weight: bold; min-height: 24px; }
    </style>
</head>
<body>

<div class="header">📱 High-Res Asset Scanner</div>

<div class="container">
    <div class="card">
        <label><input type="radio" name="type" value="Laptop" checked> Laptop</label>
        &nbsp;&nbsp;
        <label><input type="radio" name="type" value="Charger"> Charger</label>
    </div>

    <button class="btn-blue" onclick="startScanner()">📷 Open Camera</button>
    <p class="tap-hint">If blurry, <b>Tap the Video</b> to refocus</p>

    <div class="card video-wrapper" onclick="manualFocus()">
        <video id="video" playsinline muted autoplay></video>
        <div id="focusRing" class="focus-ring"></div>
    </div>

    <div class="card">
        <div id="status" style="font-size:12px; color:#999">Status: Standby</div>
        <div class="result" id="result">---</div>
    </div>

    <button class="btn-green" onclick="save()">💾 Save to Sheet</button>
</div>

<script>
    const codeReader = new ZXing.BrowserMultiFormatReader();
    let selectedDeviceId;
    let scanned = "";
    let streamPtr = null;

    async function startScanner() {
        const status = document.getElementById('status');
        
        // 1. Force High Resolution (Full HD) for tiny codes
        const constraints = {
            video: {
                facingMode: { ideal: "environment" },
                width: { ideal: 1920 },
                height: { ideal: 1080 }
            }
        };

        try {
            // Get the stream to apply advanced focus settings later
            streamPtr = await navigator.mediaDevices.getUserMedia(constraints);
            const videoElement = document.getElementById('video');
            videoElement.srcObject = streamPtr;

            status.innerText = "Status: Camera Active (1080p)";

            codeReader.decodeFromVideoElement(videoElement, (result, err) => {
                if (result) {
                    scanned = result.getText();
                    document.getElementById("result").innerText = scanned;
                    if (navigator.vibrate) navigator.vibrate(100);
                }
            });

        } catch (e) {
            alert("Error: " + e);
        }
    }

    // SIMULATED MANUAL FOCUS
    async function manualFocus() {
        if (!streamPtr) return;

        // Visual Feedback
        const ring = document.getElementById('focusRing');
        ring.classList.remove('focus-active');
        void ring.offsetWidth; // Trigger reflow
        ring.classList.add('focus-active');

        const track = streamPtr.getVideoTracks()[0];
        const capabilities = track.getCapabilities();

        // Check if the browser supports focusing
        if (capabilities.focusMode) {
            try {
                // We toggle between 'continuous' and 'manual' to force the hardware to recalibrate
                await track.applyConstraints({ advanced: [{ focusMode: "continuous" }] });
                console.log("Focus reset triggered");
            } catch (e) {
                console.log("Focus constraint not supported by this phone.");
            }
        } else {
            // Fallback: Restart the reader logic briefly
            console.log("Hardware focus not accessible. Ensure you are 6+ inches away.");
        }
    }

    function save() {
        if (!scanned) return alert("Scan first!");
        const type = document.querySelector('input[name="type"]:checked').value;
        const url = "YOUR_SCRIPT_URL_HERE?assetType=" + encodeURIComponent(type) + "&serialNumber=" + encodeURIComponent(scanned);
        
        fetch(url, { mode: 'no-cors' }).then(() => {
            alert("✅ Saved!");
            scanned = "";
            document.getElementById("result").innerText = "---";
        });
    }
</script>

</body>
</html>

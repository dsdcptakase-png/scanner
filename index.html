<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asset Scanner PRO</title>

<script src="https://unpkg.com/@zxing/library@0.19.1"></script>

<style>
body {
    margin:0;
    font-family: system-ui;
    background:#121212;
    color:white;
    text-align:center;
}
.container {
    max-width:450px;
    margin:auto;
    padding:15px;
}
.card {
    background:#1e1e1e;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
    border:1px solid #333;
}
.video-box {
    position:relative;
    border-radius:12px;
    overflow:hidden;
    background:#000;
}
video {
    width:100%;
    height:300px;
    object-fit:cover;
}

/* Scan Area */
.video-box::after {
    content:"";
    position:absolute;
    top:35%;
    left:10%;
    width:80%;
    height:30%;
    border:2px solid rgba(255,255,255,0.4);
    border-radius:10px;
}

/* Laser */
.laser {
    position:absolute;
    top:50%;
    left:5%;
    width:90%;
    height:2px;
    background:red;
    animation:blink 1s infinite;
}
@keyframes blink {50%{opacity:0.3;}}

button {
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:16px;
    margin-top:8px;
    font-weight:bold;
}
.btn-blue {background:#0d6efd;color:white;}
.btn-green {background:#198754;color:white;}
.btn-gray {background:#333;color:#ccc;}

input[type=text] {
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #444;
    background:#252525;
    color:white;
}

#result {
    font-size:22px;
    color:#4ade80;
    font-weight:bold;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>📱 Asset Scanner PRO</h2>

<div class="card">
<label><input type="radio" name="type" value="Laptop" checked> Laptop</label>
&nbsp;&nbsp;
<label><input type="radio" name="type" value="Charger"> Charger</label>
</div>

<div class="video-box">
    <video id="video" autoplay muted playsinline></video>
    <div class="laser"></div>
</div>

<button class="btn-blue" onclick="startScanner()">🔄 Start Camera</button>
<button class="btn-gray" onclick="toggleFlash()">🔦 Flash</button>

<div class="card">
<label>Zoom</label>
<input type="range" id="zoom" min="1" max="5" step="0.1" value="1">
</div>

<div class="card">
<input type="text" id="manual" placeholder="Manual entry"
oninput="manualInput(this.value)">
</div>

<div class="card">
<div>SCANNED VALUE</div>
<div id="result">---</div>
</div>

<button class="btn-green" onclick="save()">💾 SAVE</button>

</div>

<script>

let codeReader = new ZXing.BrowserMultiFormatReader({
    delayBetweenScanAttempts: 80,
    delayBetweenScanSuccess: 400
});

let selectedValue = "";
let currentStream = null;
let videoTrack = null;

/* START CAMERA */
async function startScanner() {

    if (currentStream) {
        currentStream.getTracks().forEach(t => t.stop());
    }

    const video = document.getElementById("video");

    try {
        const devices = await ZXing.BrowserCodeReader.listVideoInputDevices();

        const backCamera = devices.find(d =>
            d.label.toLowerCase().includes("back") ||
            d.label.toLowerCase().includes("rear")
        ) || devices[0];

        currentStream = await navigator.mediaDevices.getUserMedia({
            video: {
                deviceId: backCamera.deviceId,
                width: { ideal: 1920 },
                height: { ideal: 1080 }
            }
        });

        video.srcObject = currentStream;

        videoTrack = currentStream.getVideoTracks()[0];

        codeReader.decodeFromVideoDevice(backCamera.deviceId, video, (result, err) => {
            if (result) {
                selectedValue = result.text;
                document.getElementById("result").innerText = selectedValue;

                if (navigator.vibrate) navigator.vibrate(150);
            }
        });

    } catch (err) {
        alert("Camera error: " + err);
    }
}

/* FLASH */
function toggleFlash() {
    if (!videoTrack) return;

    const cap = videoTrack.getCapabilities();

    if (cap.torch) {
        videoTrack.applyConstraints({
            advanced: [{ torch: true }]
        });
    } else {
        alert("Flash not supported");
    }
}

/* ZOOM */
document.getElementById("zoom").addEventListener("input", function () {
    if (!videoTrack) return;

    const cap = videoTrack.getCapabilities();

    if (cap.zoom) {
        videoTrack.applyConstraints({
            advanced: [{ zoom: this.value }]
        });
    }
});

/* MANUAL */
function manualInput(val) {
    selectedValue = val;
    document.getElementById("result").innerText = val || "---";
}

/* SAVE */
function save() {
    if (!selectedValue) {
        alert("No data");
        return;
    }

    const type = document.querySelector('input[name="type"]:checked').value;

    const scriptUrl = "YOUR_APPS_SCRIPT_URL";

    fetch(`${scriptUrl}?type=${encodeURIComponent(type)}&serial=${encodeURIComponent(selectedValue)}`, {
        mode: "no-cors"
    });

    alert("Saved ✅");
    location.reload();
}

/* AUTO START */
window.onload = startScanner;

</script>

</body>
</html>

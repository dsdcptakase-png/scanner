<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asset Scanner PRO</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: system-ui;
    background: #121212;
    color: white;
    text-align: center;
}
.container { max-width: 450px; margin: auto; padding: 15px; }

.card {
    background: #1e1e1e;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 12px;
}

.video-box {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
}
video { width: 100%; height: 300px; object-fit: cover; }

.scan-frame {
    position: absolute;
    top: 30%; left: 10%;
    width: 80%; height: 40%;
    border: 2px solid rgba(255,255,255,0.5);
}
.laser {
    position: absolute;
    top: 50%;
    width: 100%;
    height: 2px;
    background: red;
    animation: blink 1s infinite;
}
@keyframes blink { 50% { opacity: 0.1; } }

button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
    font-weight: bold;
}
.btn-blue { background: #0d6efd; color: white; }
.btn-green { background: #198754; color: white; }

#result {
    font-size: 20px;
    color: #4ade80;
    margin-top: 10px;
}

.type-row {
    display: flex;
    justify-content: center;
    gap: 20px;
}
</style>
</head>

<body>

<div class="container">

<h3>📱 Asset Scanner PRO</h3>

<div class="card type-row">
<label><input type="radio" name="type" value="Laptop" checked> Laptop</label>
<label><input type="radio" name="type" value="Charger"> Charger</label>
</div>

<div class="video-box">
    <video id="video" autoplay playsinline></video>
    <div class="scan-frame"></div>
    <div class="laser"></div>
</div>

<p id="status">Starting camera...</p>

<button class="btn-blue" onclick="startScanner()">Restart</button>

<div class="card">
<input type="range" id="zoom" min="1" max="4" step="0.1" value="1">
</div>

<div class="card">
<input type="text" id="manual" placeholder="Manual entry">
</div>

<div id="result">---</div>

<button class="btn-green" onclick="save()">SAVE</button>

</div>

<script>
let selectedValue = "";
let videoTrack = null;
let scanInterval = null;

const video = document.getElementById("video");
const resultEl = document.getElementById("result");
const statusEl = document.getElementById("status");

function setStatus(msg){ statusEl.textContent = msg; }

function onScanned(text){
    if (!text || text === selectedValue) return;
    selectedValue = text;
    resultEl.textContent = text;
    setStatus("✅ Scanned");
}

/* LOAD ZXING */
function loadZXing(){
    return new Promise((resolve)=>{
        if(window.ZXing){ resolve(); return; }
        const s = document.createElement("script");
        s.src = "https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js";
        s.onload = resolve;
        document.head.appendChild(s);
    });
}

async function startScanner(){

    if(scanInterval) clearInterval(scanInterval);

    const stream = await navigator.mediaDevices.getUserMedia({
        video:{
            facingMode:"environment",
            width:{ideal:1280},
            height:{ideal:720}
        }
    });

    video.srcObject = stream;
    await video.play();
    videoTrack = stream.getVideoTracks()[0];

    setStatus("Camera ready");

    await loadZXing();

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d",{willReadFrequently:true});

    const hints = new Map();
    hints.set(ZXing.DecodeHintType.TRY_HARDER,true);

    // ✅ BARCODE ONLY
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[
        ZXing.BarcodeFormat.CODE_128,
        ZXing.BarcodeFormat.CODE_39,
        ZXing.BarcodeFormat.CODE_93,
        ZXing.BarcodeFormat.EAN_13,
        ZXing.BarcodeFormat.EAN_8,
        ZXing.BarcodeFormat.UPC_A,
        ZXing.BarcodeFormat.UPC_E,
        ZXing.BarcodeFormat.ITF,
        ZXing.BarcodeFormat.CODABAR
    ]);

    const reader = new ZXing.MultiFormatReader();
    reader.setHints(hints);

    scanInterval = setInterval(()=>{

        if(video.readyState !== 4) return;

        const vw = video.videoWidth;
        const vh = video.videoHeight;

        // ✅ SCAN ONLY INSIDE BOX
        const x = vw * 0.1;
        const y = vh * 0.3;
        const w = vw * 0.8;
        const h = vh * 0.4;

        canvas.width = w;
        canvas.height = h;

        ctx.drawImage(video, x, y, w, h, 0, 0, w, h);

        try{
            const img = ctx.getImageData(0,0,w,h);
            const source = new ZXing.RGBLuminanceSource(img.data,w,h);
            const bitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(source));
            const result = reader.decode(bitmap);

            if(result) onScanned(result.getText());

        }catch(e){}

    },200);
}

/* ZOOM */
document.getElementById("zoom").addEventListener("input",function(){
    if(!videoTrack) return;
    const cap = videoTrack.getCapabilities();
    if(cap.zoom){
        videoTrack.applyConstraints({advanced:[{zoom:parseFloat(this.value)}]});
    }
});

/* MANUAL */
document.getElementById("manual").addEventListener("input",function(){
    selectedValue = this.value;
    resultEl.textContent = this.value;
});

/* SAVE TO GOOGLE SHEET */
function save(){

    if(!selectedValue){
        alert("No data to save");
        return;
    }

    const type = document.querySelector('input[name="type"]:checked').value;

    const url = "https://script.google.com/macros/s/AKfycbwV72As_WKD5X1jXnVh20mA8Zh7xhu8IpSqF1To3zD-OnGg0317Z5jy31nyvS7Qr4Ffgw/exec";

    const fullUrl = `${url}?type=${encodeURIComponent(type)}&serial=${encodeURIComponent(selectedValue)}`;

    fetch(fullUrl)
    .then(()=>{
        alert("✅ Saved to Google Sheet");
    })
    .catch(()=>{
        alert("⚠️ Saved (no response)");
    });

    selectedValue = "";
    resultEl.textContent = "---";
    document.getElementById("manual").value = "";
}

startScanner();
</script>

</body>
</html>
